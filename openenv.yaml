name: email-triage-env
version: 1.0
description: Email triage environment

tasks:
  - name: easy_spam
    description: Simple spam classification task
    grading: enabled
    grader_module: env.graders
    grader_function: grade_easy_spam
    
  - name: medium_meeting
    description: Medium difficulty meeting classification task
    grading: enabled
    grader_module: env.graders
    grader_function: grade_medium_meeting
    
  - name: hard_multi
    description: Hard difficulty multi-intent classification task
    grading: enabled
    grader_module: env.graders
    grader_function: grade_hard_multi
    
  - name: support_request
    description: Support request classification task
    grading: enabled
    grader_module: env.graders
    grader_function: grade_support_request

